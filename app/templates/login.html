{% extends 'base.html' %}
{% block content %}
  <h2>Login</h2>
  <form method="post" action="{{ url_for('auth.login') }}">
    <input name="username" placeholder="Username" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
{% endblock %}
